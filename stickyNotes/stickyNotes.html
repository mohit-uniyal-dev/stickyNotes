<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Stick it - web notes</title>
    <link rel="stylesheet" href="../styles/colorPalette.css" />
    <link rel="stylesheet" href="stickyNotes.css" />
  </head>
  <body>
    <main class="popup-shell">
      <div id="notesContainer"></div>

      <header class="heading-color popup-header">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <img src="../assets/icons/icon_128.png" alt="" width="30" height="30" />
          </div>
          <h1 id="title" class="title">Stick it - web notes</h1>
        </div>

        <button
          id="openTabButton"
          class="allNoteBtn icon-button"
          type="button"
          aria-label="Settings and preferences"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            fill="none"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"
              stroke="currentColor"
              stroke-width="2"
            />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.1.34.36.61.7.72.25.08.52.14.8.14H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>

        <nav id="settingsMenu" class="dropdown-content" aria-label="Popup settings">
          <a href="#" id="seeAllNotes">See All Notes</a>
          <a href="#" state="false" id="unPinAll"></a>
        </nav>
      </header>

      <div class="action-row">
        <button id="add-note" class="sn-button sn-button-primary add-note-button" type="button">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
          </svg>
          Add Note
        </button>

        <button
          id="add-global-note"
          class="add-global-button"
          type="button"
          aria-label="Add or open the global note shown on every site"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.9" />
            <path
              d="M3 12h18M12 3c2.5 2.4 3.8 5.6 3.8 9S14.5 18.6 12 21c-2.5-2.4-3.8-5.6-3.8-9S9.5 5.4 12 3Z"
              stroke="currentColor"
              stroke-width="1.7"
            />
          </svg>
          Global Note
        </button>
      </div>

      <section class="notes-panel" aria-label="Saved notes for this website">
        <div class="noOfNotes">
          <h2 id="notesNumber" class="title mt-3">No Notes Saved</h2>
          <button class="button removeAll" type="button" aria-label="Delete all notes">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="none"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                d="M9 11v6M15 11v6M4 7h16M10 4h4a1 1 0 0 1 1 1v2H9V5a1 1 0 0 1 1-1Z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="m6 7 1 13h10l1-13"
                stroke="currentColor"
                stroke-width="2"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <div id="allNotesList"></div>
        <div class="pagination"></div>
      </section>
    </main>

    <script src="../scripts/custom_script/popper.min.js"></script>
    <script src="../scripts/custom_script/tippy.min.js"></script>
    <script src="../scripts/custom_script/messageTypes.js"></script>
    <script src="../scripts/custom_script/localizedText.js"></script>
    <script src="../scripts/custom_script/localdb.js"></script>
    <script src="stickyNotes.js"></script>
    <script src="../scripts/custom_script/tooltip.js"></script>
  </body>
</html>
