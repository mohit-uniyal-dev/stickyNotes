<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stick it - web notes</title>
    <link rel="stylesheet" href="../styles/colorPalette.css" />
    <link rel="stylesheet" href="../styles/bootstrap-lib/css/bootstrap.css" />
    <link rel="stylesheet" href="../styles/index.css" />
  </head>
  <body>
    <div class="stickNoteWrapper">
      <header class="heading app-header">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <img src="../assets/icons/icon_128.png" alt="" width="30" height="30" />
          </div>
          <span>Stick it - web notes</span>
        </div>

        <div class="icons app-actions">
          <button id="refresh" class="icon-button" type="button" aria-label="Refresh notes">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M20 6v5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M19 11a7 7 0 1 0-2.05 4.95" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <button class="icon-button grid" type="button" aria-label="Toggle grid view">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 4h6v6H4V4ZM14 4h6v6h-6V4ZM4 14h6v6H4v-6ZM14 14h6v6h-6v-6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </header>

      <main class="notes-layout">
        <aside class="stickyNoteSideBar">
          <div class="search-shell">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <input id="searchBox" type="search" placeholder="Search" aria-label="Search" />
          </div>

          <div class="list_notes">
            <div class="cards"></div>
          </div>
        </aside>

        <button id="sideBar" class="sideBarOpen" type="button" aria-label="Toggle sidebar">
          <span class="open-position">
            <svg class="postion" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m9 18 6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
        </button>

        <section class="contentContainer" aria-label="Notes"></section>
      </main>
    </div>

    <script src="../scripts/custom_script/messageTypes.js"></script>
    <script src="../scripts/custom_script/localizedText.js"></script>
    <script src="../scripts/custom_script/popper.min.js"></script>
    <script src="../scripts/custom_script/tippy.min.js"></script>
    <script src="../scripts/custom_script/tooltip.js"></script>
    <script src="../scripts/custom_script/localdb.js"></script>
    <script src="../scripts/custom_script/tab.js"></script>
  </body>
</html>
